<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Find TG4 Irish language programmes with Irish subtitles and filter by availability.">
  <title>TG4 Irish Subtitles Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>

<body>

  <header>
    <h1>TG4: Irish Language Programmes with Irish Subtitles</h1>
    <p id="info">
      <span aria-hidden="true" class="icon">&#9432;</span>
      <span class="visually-hidden">Info:</span>
      Filter shows on TG4 by subtitles and geo restrictions
    </p>
    <label for="subsToggle">
      <input type="checkbox" id="subsToggle" checked>
      <span class="toggle-label">Only show programmes with Irish subtitles</span>
    </label>
  </header>



  <main>
    <section id="genres" aria-live="polite">
      <div class="loading">Loading programmes...</div>
    </section>
  </main>

  <script src="script.js" defer></script>

</body>

</html>
